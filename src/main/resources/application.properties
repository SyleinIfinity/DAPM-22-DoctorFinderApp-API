spring.application.name=${SPRING_APPLICATION_NAME:backend}

# Local PostgreSQL (Docker) defaults
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db_info}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:admin}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:123456}
spring.datasource.driver-class-name=org.postgresql.Driver

# Do not auto-create/alter schema (we apply `schema_postgresql.sql` to the DB)
spring.jpa.hibernate.ddl-auto=none

# Cloudinary (avatar only)
cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api-key=${CLOUDINARY_API_KEY:}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:}

# Multipart upload limits
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# Minh chung storage (local git repo)
app.storage.minh-chung.base-dir=${APP_STORAGE_MINH_CHUNG_BASE_DIR:/home/sylein/dapm_stogare}
app.storage.public-base-url=${APP_STORAGE_PUBLIC_BASE_URL:http://127.0.0.1:8080}

# Gmail SMTP (OTP email)
spring.mail.host=${SPRING_MAIL_HOST:smtp.gmail.com}
spring.mail.port=${SPRING_MAIL_PORT:587}
spring.mail.username=${SPRING_MAIL_USERNAME:}
spring.mail.password=${SPRING_MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${APP_MAIL_FROM:${SPRING_MAIL_USERNAME:}}
app.mail.display-name=${APP_MAIL_DISPLAY_NAME:WEBPC Support}

# Firebase Admin (Firestore)
firebase.credentials.path=${FIREBASE_CREDENTIALS_PATH:secrets/firebase-service-account.json}

# OTP stage (Firestore)
app.otp.collection=${APP_OTP_COLLECTION:otp_stage}
app.otp.length=${APP_OTP_LENGTH:6}
app.otp.expire-seconds=${APP_OTP_EXPIRE_SECONDS:300}
app.otp.resend-cooldown-seconds=${APP_OTP_RESEND_COOLDOWN_SECONDS:60}
app.otp.max-attempts=${APP_OTP_MAX_ATTEMPTS:5}
app.otp.lock-seconds=${APP_OTP_LOCK_SECONDS:900}
app.otp.proof-secret=${APP_OTP_PROOF_SECRET:CHANGE_THIS_OTP_PROOF_SECRET_MIN_32_CHARS_LONG}
app.otp.proof-expire-seconds=${APP_OTP_PROOF_EXPIRE_SECONDS:900}

# Auth rate-limit controls
app.security.login.max-failures=${APP_SECURITY_LOGIN_MAX_FAILURES:5}
app.security.login.window-seconds=${APP_SECURITY_LOGIN_WINDOW_SECONDS:900}
app.security.login.block-seconds=${APP_SECURITY_LOGIN_BLOCK_SECONDS:900}
app.security.otp.window-seconds=${APP_SECURITY_OTP_WINDOW_SECONDS:600}

# Git Storage Config
app.storage.git.repo-url=${APP_STORAGE_GIT_REPO_URL:https://github.com/SyleinIfinity/DAPM-22-FinderDoctor-Storaged.git}
app.storage.git.ssh-key-path=${APP_STORAGE_GIT_SSH_KEY_PATH:/home/sylein/.ssh/id_ed25519}
app.storage.git.auto-commit=${APP_STORAGE_GIT_AUTO_COMMIT:true}
app.storage.git.auto-push=${APP_STORAGE_GIT_AUTO_PUSH:true}
app.storage.git.commit-author-name=${APP_STORAGE_GIT_COMMIT_AUTHOR_NAME:DAPM-Storage}
app.storage.git.commit-author-email=${APP_STORAGE_GIT_COMMIT_AUTHOR_EMAIL:storage@dapm.local}
app.security.otp.block-seconds=${APP_SECURITY_OTP_BLOCK_SECONDS:900}
app.security.otp.send.max-per-ip=${APP_SECURITY_OTP_SEND_MAX_PER_IP:10}
app.security.otp.send.max-per-email=${APP_SECURITY_OTP_SEND_MAX_PER_EMAIL:5}
app.security.otp.verify.max-per-ip=${APP_SECURITY_OTP_VERIFY_MAX_PER_IP:20}
app.security.otp.verify.max-per-email=${APP_SECURITY_OTP_VERIFY_MAX_PER_EMAIL:10}

# Gemini API (AI image search for doctors)
app.ai.gemini.api-key=${GEMINI_API_KEY:}
app.ai.gemini.embedding-model=${GEMINI_EMBEDDING_MODEL:gemini-embedding-2}
app.ai.gemini.base-url=${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta/models}
app.ai.gemini.request-timeout-seconds=${GEMINI_REQUEST_TIMEOUT_SECONDS:30}
app.ai.doctor-image-search.max-candidates=${APP_AI_DOCTOR_IMAGE_SEARCH_MAX_CANDIDATES:30}
app.ai.doctor-image-search.default-limit=${APP_AI_DOCTOR_IMAGE_SEARCH_DEFAULT_LIMIT:5}

# Put this file at: /etc/nginx/sites-available/finder-doctor
# Then enable: sudo ln -s /etc/nginx/sites-available/finder-doctor /etc/nginx/sites-enabled/finder-doctor
#
# This config exposes the backend at:
#   https://34.126.165.66/finder-doctor/...
#
# Note: For a publicly trusted certificate, use a real domain + Let's Encrypt.

server {
    listen 443 ssl http2;
    server_name 34.126.165.66;

    ssl_certificate /etc/ssl/certs/finder-doctor.crt;
    ssl_certificate_key /etc/ssl/private/finder-doctor.key;

    client_max_body_size 25m;

    location = /finder-doctor {
        return 301 /finder-doctor/;
    }

    location /finder-doctor/ {
        proxy_pass http://127.0.0.1:8080/;

        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Prefix /finder-doctor;

        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
    }
}
